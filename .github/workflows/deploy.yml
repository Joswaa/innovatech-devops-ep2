name: Deploy Docker Images to AWS ECR

on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # =========================
      # BACKEND
      # =========================

      - name: Build Backend Image
        run: |
          docker build -t innovatech-backend ./backend

      - name: Tag Backend Image
        run: |
          docker tag innovatech-backend:latest \
          ${{ secrets.ECR_REGISTRY }}/innovatech-backend:latest

      - name: Push Backend Image
        run: |
          docker push \
          ${{ secrets.ECR_REGISTRY }}/innovatech-backend:latest

      # =========================
      # FRONTEND
      # =========================

      - name: Build Frontend Image
        run: |
          docker build -t innovatech-frontend ./frontend

      - name: Tag Frontend Image
        run: |
          docker tag innovatech-frontend:latest \
          ${{ secrets.ECR_REGISTRY }}/innovatech-frontend:latest

      - name: Push Frontend Image
        run: |
          docker push \
          ${{ secrets.ECR_REGISTRY }}/innovatech-frontend:latest

      # =========================
      # DATABASE
      # =========================

      - name: Build DB Image
        run: |
          docker build -t innovatech-db ./db

      - name: Tag DB Image
        run: |
          docker tag innovatech-db:latest \
          ${{ secrets.ECR_REGISTRY }}/innovatech-db:latest

      - name: Push DB Image
        run: |
          docker push \
          ${{ secrets.ECR_REGISTRY }}/innovatech-db:latest
